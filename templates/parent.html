<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Parent Portal</title>
    <link rel="manifest" href="/static/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#0F172A', accent: '#3B82F6' }
                }
            }
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden text-slate-800">

    <header class="bg-white border-b border-gray-200 px-5 py-4 flex justify-between items-center sticky top-0 z-20">
        <div>
            <h1 class="text-lg font-bold text-slate-900">Parent Portal</h1>
            <p class="text-xs text-slate-500" id="current-date">...</p>
        </div>
        <div class="w-9 h-9 rounded-full bg-indigo-50 text-indigo-700 flex items-center justify-center font-bold text-sm border border-indigo-100" id="parent-avatar">P</div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24" id="main-scroll">
        
        <div id="view-dashboard" class="content-section">
            <div class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-2xl p-5 text-white shadow-xl mb-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10"></div>
                <p class="text-slate-300 text-xs mb-1">Student Profile</p>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-sm text-xl">🎓</div>
                    <div>
                        <h2 class="text-xl font-bold" id="child-name">Loading...</h2>
                        <p class="text-xs text-slate-300 font-mono" id="child-batch">...</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Attendance</p>
                    <p class="text-2xl font-bold text-green-600 mt-1" id="child-attendance">--%</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider">Fees Due</p>
                    <p class="text-2xl font-bold text-red-600 mt-1" id="child-fee">₹0</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="material-symbols-rounded text-blue-600">monitoring</span> Performance Trend
                </h3>
                <div class="h-48">
                    <canvas id="miniPerformanceChart"></canvas>
                </div>
            </div>

            <h3 class="font-bold text-slate-800 mb-3">Announcements</h3>
            <div id="announcements-list" class="space-y-3">
                <p class="text-center text-slate-400 text-xs py-4">Checking for updates...</p>
            </div>
        </div>

        <div id="view-analytics" class="content-section hidden">
            <h2 class="text-xl font-bold mb-4">Detailed Analytics</h2>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-4">
                <canvas id="mainPerformanceChart"></canvas>
            </div>
            <div id="exam-details-list" class="space-y-3">
                </div>
        </div>

        <div id="view-attendance" class="content-section hidden">
            <h2 class="text-xl font-bold mb-4">Attendance Log</h2>
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr><th class="p-3 font-semibold text-slate-600">Date</th><th class="p-3 font-semibold text-slate-600 text-right">Status</th></tr>
                    </thead>
                    <tbody id="attendance-list" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="view-profile" class="content-section hidden">
            <h2 class="text-xl font-bold mb-4">Parent Profile</h2>
            <div class="bg-white p-5 rounded-xl border border-slate-200 space-y-4">
                <div><label class="text-xs text-gray-400 uppercase font-bold">Name</label><p id="parent-name" class="font-medium">-</p></div>
                <div><label class="text-xs text-gray-400 uppercase font-bold">Phone</label><p id="parent-phone" class="font-medium">-</p></div>
                <div><label class="text-xs text-gray-400 uppercase font-bold">Email</label><p id="parent-email" class="font-medium">-</p></div>
                <button id="logout-btn" class="w-full bg-red-50 text-red-600 py-3 rounded-lg font-bold mt-2">Sign Out</button>
            </div>
        </div>

    </main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full z-30 pb-safe">
        <div class="flex justify-around items-center px-2 py-2">
            <button onclick="switchTab('dashboard')" class="nav-btn text-indigo-600 flex flex-col items-center p-2 w-16" data-target="dashboard">
                <span class="material-symbols-rounded text-2xl">grid_view</span>
                <span class="text-[10px] font-medium mt-1">Home</span>
            </button>
            <button onclick="switchTab('analytics')" class="nav-btn text-gray-400 flex flex-col items-center p-2 w-16" data-target="analytics">
                <span class="material-symbols-rounded text-2xl">insights</span> <span class="text-[10px] font-medium mt-1">Graph</span>
            </button>
            <button onclick="switchTab('attendance')" class="nav-btn text-gray-400 flex flex-col items-center p-2 w-16" data-target="attendance">
                <span class="material-symbols-rounded text-2xl">calendar_month</span>
                <span class="text-[10px] font-medium mt-1">Attend</span>
            </button>
            <button onclick="switchTab('profile')" class="nav-btn text-gray-400 flex flex-col items-center p-2 w-16" data-target="profile">
                <span class="material-symbols-rounded text-2xl">person</span>
                <span class="text-[10px] font-medium mt-1">Profile</span>
            </button>
        </div>
    </nav>

    <script>
        const API_BASE_URL = '/api';
        let childId = null;

        // --- CHART CONFIGURATION ---
        let chartInstance = null;

        function renderChart(examData) {
            const ctx = document.getElementById('miniPerformanceChart').getContext('2d');
            const mainCtx = document.getElementById('mainPerformanceChart').getContext('2d');
            
            // Sample Data if none exists (for demo)
            if (!examData || examData.length === 0) {
                examData = [
                    { exam: 'Unit Test 1', percentage: 65 },
                    { exam: 'Mid Term', percentage: 72 },
                    { exam: 'Unit Test 2', percentage: 68 },
                    { exam: 'Prelims', percentage: 85 }
                ];
            }

            const labels = examData.map(e => e.exam);
            const scores = examData.map(e => e.percentage);

            const config = {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Performance (%)',
                        data: scores,
                        borderColor: '#4F46E5', // Indigo color
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.4, // Smooth curves
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#4F46E5',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            };

            // Render Mini Chart
            new Chart(ctx, config);
            
            // Render Main Chart (Detailed)
            new Chart(mainCtx, config);
        }

        // --- NAVIGATION ---
        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + tabId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.target === tabId) {
                    btn.classList.remove('text-gray-400');
                    btn.classList.add('text-indigo-600');
                } else {
                    btn.classList.add('text-gray-400');
                    btn.classList.remove('text-indigo-600');
                }
            });

            if(tabId === 'dashboard') loadDashboard();
            if(tabId === 'analytics') loadAnalytics(); // Fetch chart data
            if(tabId === 'attendance') loadAttendance();
            if(tabId === 'profile') loadProfile();
        }

        // --- DATA LOADERS ---
        async function loadDashboard() {
            try {
                // 1. Get Child Info
                const res = await fetch(API_BASE_URL + '/parent/child_info');
                const child = await res.json();
                
                if (child) {
                    childId = child.id;
                    document.getElementById('child-name').textContent = child.name;
                    document.getElementById('child-batch').textContent = child.session_name || 'Batch N/A';
                    
                    // 2. Get Child Stats
                    const statsRes = await fetch(API_BASE_URL + '/student/dashboard'); // Reusing student API
                    // Note: In a real app, you'd fetch /api/parent/child_stats?child_id=...
                    // For now, we simulate or fetch simple data
                    
                    // Simulate fetching grades for the chart
                    renderChart(); 
                }

                // 3. Get Announcements
                loadAnnouncements();

            } catch(e) { console.error(e); }
        }

        async function loadAnalytics() {
            // Here you would fetch real exam results from API
            // For now, it uses the simulated data in renderChart()
            // Future API: /api/student/results?student_id=${childId}
        }

        async function loadAnnouncements() {
            const container = document.getElementById('announcements-list');
            try {
                const res = await fetch(API_BASE_URL + '/my/announcements');
                const data = await res.json();
                
                if(data.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-400 text-sm py-10">No updates.</div>';
                    return;
                }

                container.innerHTML = data.map(n => `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                                <span class="material-symbols-rounded text-sm">campaign</span>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm mb-1">${n.title}</h4>
                                <p class="text-xs text-slate-500 mb-2">${n.created_at}</p>
                                <p class="text-sm text-slate-600">${n.content}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function loadAttendance() {
            // Reusing student attendance API logic but for the specific child
            const tbody = document.getElementById('attendance-list');
            try {
                const res = await fetch(API_BASE_URL + '/my/attendance'); // This API uses session, so it gets the logged-in parent's child data automatically if handled in backend
                const data = await res.json();
                
                if(!data.length) { tbody.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-gray-400">No records.</td></tr>'; return; }
                
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td class="p-3 text-slate-800"><div class="font-medium">${a.date}</div><div class="text-xs text-gray-400">${a.time}</div></td>
                        <td class="p-3 text-right"><span class="px-2 py-1 rounded text-xs font-bold ${a.status==='Present'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${a.status}</span></td>
                    </tr>
                `).join('');
                
                // Update Dashboard Stat
                const total = data.length;
                const present = data.filter(d => d.status === 'Present').length;
                const pct = total > 0 ? Math.round((present/total)*100) : 0;
                document.getElementById('child-attendance').textContent = pct + '%';

            } catch(e) {}
        }

        async function loadProfile() {
            try {
                const res = await fetch(API_BASE_URL + '/my/profile');
                const u = await res.json();
                document.getElementById('parent-name').textContent = u.name;
                document.getElementById('parent-email').textContent = u.email;
                document.getElementById('parent-phone').textContent = u.phone_number || '-';
            } catch(e) {}
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const dateEl = document.getElementById('current-date');
            dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });
            switchTab('dashboard');
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch(`${API_BASE_URL}/logout`, { method: 'POST' });
            window.location.href = '/';
        });
    </script>
</body>
</html>
