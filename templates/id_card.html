<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card - {{ student.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #1173d4; 
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Vertical ID Card Dimensions (Standard CR80) */
        .id-card-container {
            width: 216px; 
            height: 342px; 
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background-color: #ffffff; /* Must have solid bg for JPG download */
        }

        /* Top Header */
        .header {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .institute-logo {
            height: 24px; /* Adjust based on your logo shape */
            max-width: 150px;
            object-fit: contain;
            margin-bottom: 3px;
        }

        .header-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin: 0;
            line-height: 1.2;
        }

        .header-sub {
            font-size: 8px;
            font-weight: 500;
            opacity: 0.95;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 3px;
        }

        /* Card Body */
        .body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 12px 5px;
        }

        .photo-container {
            width: 70px;
            height: 70px;
            border-radius: 8px; 
            border: 2px solid var(--primary);
            overflow: hidden;
            margin-bottom: 8px;
            background: #f9fafb;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-name {
            font-size: 14px;
            font-weight: 800;
            color: #1f2937;
            text-align: center;
            margin: 0 0 2px 0;
            line-height: 1.1;
        }

        .student-batch {
            font-size: 9px;
            color: var(--primary);
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            background: #eff6ff;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Student Details Grid */
        .info-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 45px 1fr;
            gap: 4px;
            font-size: 10px;
            color: #4b5563;
        }

        .info-label {
            font-weight: 700;
            color: #111827;
        }

        /* Bottom Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px 15px;
            border-top: 2px solid var(--primary);
            background: #f9fafb;
        }

        .qr-code {
            width: 45px;
            height: 45px;
            border-radius: 4px;
        }

        .signature {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .director-sign {
            height: 22px; /* Height of the signature image */
            max-width: 70px;
            object-fit: contain;
            margin-bottom: 2px;
        }

        .signature-line {
            width: 65px;
            border-top: 1px solid #111827;
            margin: 0 auto 2px;
        }

        .sign-label {
            font-size: 8px;
            color: #6b7280;
            font-weight: 700;
        }

        /* Universal Print Styles */
        @media print {
            body { background: white; display: block; padding: 0; margin: 0; }
            .id-card-container {
                box-shadow: none; border: 1px solid #ccc;
                width: 54mm; height: 85.6mm;
                border-radius: 4px; page-break-inside: avoid;
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
            .action-buttons { display: none !important; }
        }

        /* UI Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-print { background: #374151; }
        .btn-print:hover { background: #1f2937; transform: translateY(-2px); }
        
        .btn-jpg { background: #1173d4; }
        .btn-jpg:hover { background: #0e5ea8; transform: translateY(-2px); }
        
        .btn-png { background: #059669; }
        .btn-png:hover { background: #047857; transform: translateY(-2px); }

        .icon { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="id-card-container" id="student-id-card">
        <div class="header">
            <img src="{{ url_for('static', filename='cst_logo.png') }}" alt="CST Logo" onerror="this.src='https://placehold.co/120x30/1173d4/white?text=CST+LOGO'" class="institute-logo" crossorigin="anonymous">
            <h1 class="header-title">CST INSTITUTE</h1>
            <div class="header-sub">STUDENT IDENTITY CARD</div>
        </div>

        <div class="body">
            <div class="photo-container">
                <img src="{{ student.profile_photo_url or 'https://placehold.co/150?text=No+Photo' }}" alt="Student Photo" crossorigin="anonymous">
            </div>

            <h2 class="student-name">{{ student.name }}</h2>
            <div class="student-batch">{{ student.session_name or 'No Batch Assigned' }}</div>

            <div class="info-grid">
                <div class="info-label">Adm No:</div>
                <div style="font-weight: 700; color:#111827;">{{ student.admission_number or 'N/A' }}</div>
                
                <div class="info-label">DOB:</div>
                <div style="font-weight: 500;">{{ student.dob or 'N/A' }}</div>
                
                <div class="info-label">Phone:</div>
                <div style="font-weight: 500;">{{ student.phone_number or 'N/A' }}</div>
            </div>
        </div>

        <div class="footer">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=STUDENT_ID_{{ student.id }}" alt="QR" class="qr-code" crossorigin="anonymous">
            
            <div class="signature">
                <img src="{{ url_for('static', filename='director_sign.png') }}" alt="Director Signature" onerror="this.src='https://placehold.co/70x25/f9fafb/a8a29e?text=Signature'" class="director-sign" crossorigin="anonymous">
                <div class="signature-line"></div>
                <div class="sign-label">Director Sign</div>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button onclick="window.print()" class="btn btn-print">
            <svg class="icon" viewBox="0 0 16 16"><path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/><path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2h-3v-2h3a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H5zM11 5H5V3h6v2zM5 9h6v4H5V9z"/></svg>
            Print ID Card
        </button>

        <button onclick="downloadImage('jpeg')" class="btn btn-jpg">
            <svg class="icon" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
            Download JPG
        </button>

        <button onclick="downloadImage('png')" class="btn btn-png">
            <svg class="icon" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
            Download PNG
        </button>
    </div>

    <script>
        function downloadImage(format) {
            const cardElement = document.getElementById('student-id-card');
            
            // html2canvas takes a snapshot of the HTML element and turns it into an image
            html2canvas(cardElement, {
                scale: 4, // 4x resolution for super crisp printing
                useCORS: true, // Crucial: allows external images like QR code and student photos to be captured
                backgroundColor: '#ffffff' // Ensure background isn't transparent in JPG
            }).then(canvas => {
                // Convert canvas to image URL
                const imageUrl = canvas.toDataURL(`image/${format}`, 1.0);
                
                // Create a temporary link to force the browser to download
                const downloadLink = document.createElement('a');
                downloadLink.href = imageUrl;
                
                // Clean up student name for the file name
                const safeName = "{{ student.name }}".replace(/[^a-z0-9]/gi, '_').toLowerCase();
                downloadLink.download = `CST_ID_Card_${safeName}.${format}`;
                
                // Trigger download
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            }).catch(err => {
                console.error("Error generating image:", err);
                alert("Failed to generate image. Please try again.");
            });
        }
    </script>
</body>
</html>
