<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card - {{ student.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1173d4; /* CST Institute Primary Blue */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Vertical ID Card Dimensions (Standard CR80) */
        .id-card-container {
            width: 216px; 
            height: 342px; 
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Top Header */
        .header {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 12px 5px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .header-sub {
            font-size: 8px;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* Card Body */
        .body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 12px 10px;
        }

        .photo-container {
            width: 75px;
            height: 75px;
            border-radius: 8px; /* Slightly rounded square looks very professional vertically */
            border: 2px solid var(--primary);
            overflow: hidden;
            margin-bottom: 12px;
            background: #f9fafb;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-name {
            font-size: 14px;
            font-weight: 700;
            color: #1f2937;
            text-align: center;
            margin: 0 0 3px 0;
            line-height: 1.1;
        }

        .student-batch {
            font-size: 10px;
            color: var(--primary);
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
        }

        /* Student Details Grid */
        .info-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 45px 1fr;
            gap: 5px;
            font-size: 10px;
            color: #4b5563;
            margin-bottom: auto;
        }

        .info-label {
            font-weight: 700;
            color: #111827;
        }

        /* Bottom Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 12px 15px;
            border-top: 2px solid var(--primary);
            background: #f9fafb;
        }

        .qr-code {
            width: 45px;
            height: 45px;
            border-radius: 4px;
        }

        .signature {
            text-align: center;
            padding-bottom: 2px;
        }

        .signature-line {
            width: 65px;
            border-top: 1px solid #111827;
            margin: 0 auto 4px;
        }

        .sign-label {
            font-size: 8px;
            color: #6b7280;
            font-weight: 700;
        }

        /* Universal Print Styles */
        @media print {
            body {
                background: white;
                display: block;
                padding: 0;
                margin: 0;
            }
            .id-card-container {
                box-shadow: none;
                border: 1px solid #ccc; /* faint cut-line */
                width: 54mm; /* Exact standard physical width */
                height: 85.6mm; /* Exact standard physical height */
                border-radius: 4px;
                page-break-inside: avoid;
                -webkit-print-color-adjust: exact; /* Forces Chrome/Safari to print background colors */
                print-color-adjust: exact; /* Standard syntax */
            }
            .print-btn {
                display: none !important; /* Hides the button on paper */
            }
        }

        /* UI Print Button */
        .print-btn {
            margin-top: 25px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(17, 115, 212, 0.2);
            transition: all 0.2s;
        }
        .print-btn:hover {
            background: #0e5ea8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="id-card-container">
        <div class="header">
            <h1 class="header-title">CST INSTITUTE</h1>
            <div class="header-sub">STUDENT IDENTITY CARD</div>
        </div>

        <div class="body">
            <div class="photo-container">
                <img src="{{ student.profile_photo_url or 'https://placehold.co/150?text=No+Photo' }}" alt="Student Photo">
            </div>

            <h2 class="student-name">{{ student.name }}</h2>
            <div class="student-batch">{{ student.session_name or 'No Batch Assigned' }}</div>

            <div class="info-grid">
                <div class="info-label">Adm No:</div>
                <div style="font-weight: 600; color:#111827;">{{ student.admission_number or 'N/A' }}</div>
                
                <div class="info-label">DOB:</div>
                <div>{{ student.dob or 'N/A' }}</div>
                
                <div class="info-label">Phone:</div>
                <div>{{ student.phone_number or 'N/A' }}</div>
            </div>
        </div>

        <div class="footer">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=STUDENT_ID_{{ student.id }}" alt="QR" class="qr-code">
            
            <div class="signature">
                <div class="signature-line"></div>
                <div class="sign-label">Auth. Sign</div>
            </div>
        </div>
    </div>

    <button onclick="window.print()" class="print-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>
            <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2h-3v-2h3a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H5zM11 5H5V3h6v2zM5 9h6v4H5V9z"/>
        </svg>
        Quick Print ID Card
    </button>

</body>
</html>
